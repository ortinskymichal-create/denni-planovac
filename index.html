<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denní Plánovač</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2980b9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            --primary: #2980b9; --success: #27ae60; --bg-color: #f4f7f6;
            --card-bg: #ffffff; --text-dark: #333333; --shadow: 0 4px 10px rgba(0,0,0,0.08);
            --dot-color: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); overscroll-behavior-y: none; padding-bottom: 80px; overflow-x: hidden; }

        .view { display: none; min-height: calc(100vh - 150px); }
        .view.active { display: block; }

        /* HORIZONTÁLNÍ NAVIGACE */
        .days-nav { display: flex; overflow-x: auto; background: var(--card-bg); padding: 15px 10px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 10; scrollbar-width: none; align-items: center; }
        .days-nav::-webkit-scrollbar { display: none; }
        .day-tab { flex: 0 0 auto; padding: 10px 18px; margin-right: 10px; border-radius: 20px; background: #eee; color: #666; font-weight: bold; text-decoration: none; text-align: center; border: 2px solid transparent; transition: background-color 0.2s, color 0.2s; }
        .day-tab.today { border-color: var(--primary); color: var(--primary); background: #e6f2ff; }
        .day-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .icon-btn { font-size: 1.5rem; background: transparent; border: none; padding: 0 10px; cursor: pointer; color: var(--primary); }
        
        /* DECENTNÍ TUŽKA PRO EDITACI A DRAG HANDLE */
        .edit-btn { color: #aaa; background: transparent; border: none; padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .task-card.completed .edit-btn { color: #fff; opacity: 0.7; }
        .drag-handle { color: #ccc; padding-right: 15px; font-size: 1.5rem; cursor: grab; touch-action: none; display: flex; align-items: center; justify-content: center; }
        .task-card.completed .drag-handle { color: #fff; opacity: 0.5; cursor: default; pointer-events: none; }

        /* KARTY ÚKOLŮ */
        .task-container { padding: 20px 15px; display: flex; flex-direction: column; gap: 15px; min-height: 50vh; position: relative; }
        .task-card {
            background: var(--card-bg); border-radius: 15px; padding: 10px 10px 10px 15px;
            box-shadow: var(--shadow); font-weight: 600; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: space-between;
            transition: transform 0.1s linear, background-color 0.4s ease, opacity 0.3s;
            user-select: none; position: relative; z-index: 2;
        }
        .task-card.completed { background-color: var(--success); color: white; box-shadow: none; }
        .task-text { flex: 1; margin-right: 10px; pointer-events: none; }
        .task-card.sortable-ghost { opacity: 0.4; } 

        /* NOVÉ: TLAČÍTKO PŘIDAT (KOLEČKO) */
        .add-btn-container { padding: 20px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .add-btn { 
            width: 65px; height: 65px; 
            border: 2px dashed var(--primary); 
            background: transparent; 
            color: var(--primary); 
            border-radius: 50%; 
            font-size: 2.5rem; 
            font-weight: 300; 
            cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            padding: 0; 
            box-shadow: 0 4px 10px rgba(41, 128, 185, 0.1);
            transition: transform 0.1s;
        }
        .add-btn:active { transform: scale(0.95); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -3px 15px rgba(0,0,0,0.08); z-index: 100; }
        .nav-item { color: #aaa; text-decoration: none; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item span { font-size: 1.4rem; }

        /* KALENDÁŘ */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; font-size: 1.2rem; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; padding: 10px; text-align: center; position: relative; }
        .cal-day-name { font-weight: bold; color: #888; font-size: 0.9rem; padding-bottom: 10px; }
        .cal-day { padding: 15px 0; border-radius: 10px; font-weight: bold; position: relative; cursor: pointer; background: var(--card-bg); border: 2px solid transparent; }
        .cal-day.empty { background: transparent; cursor: default; border: none; }
        .cal-day.today { border-color: var(--primary); color: var(--primary); }
        .cal-day.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .task-dot { height: 6px; width: 6px; background-color: var(--dot-color); border-radius: 50%; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); }

        /* NOVÉ: ROZVRŽENÍ AGENDA (ÚKOLY) */
        .agenda-layout { padding: 20px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 40px; }
        .agenda-day-header { font-size: 1.1rem; font-weight: bold; color: var(--primary); margin: 15px 0 0 0; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .agenda-layout .agenda-day-header:first-child { margin-top: 0; }
        
        .trash-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px 5px 15px; }

        /* DIALOGY */
        dialog { margin: auto; border: none; border-radius: 20px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 95%; max-width: 450px; }
        dialog::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
        .dialog-content input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; font-size: 1.1rem; outline: none; }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-text { background: transparent; color: #888; }
        .btn-danger { background: transparent; border: 1px solid var(--dot-color); color: var(--dot-color); padding: 8px 15px; }

        /* ANIMACE PRO PLYNULÉ PŘECHODY DNŮ A MĚSÍCŮ */
        .anim-container { position: relative; overflow: hidden; width: 100%; }
        .slide-element { transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); width: 100%; }
        .slide-clone { position: absolute; top: 0; left: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="view-plan" class="view active">
        <nav class="days-nav" id="daysNav"></nav>
        <div class="anim-container">
            <main class="task-container slide-element" id="taskContainer"></main>
        </div>
        <div class="add-btn-container"><button class="add-btn" id="openAddDialogBtn">+</button></div>
    </div>

    <div id="view-calendar" class="view">
        <div class="calendar-header">
            <button class="icon-btn" id="calPrevMonth">◀</button><span id="calMonthYear"></span><button class="icon-btn" id="calNextMonth">▶</button>
        </div>
        <div class="anim-container" style="min-height: 350px;">
            <div class="calendar-grid slide-element" id="mainCalendarGrid"></div>
        </div>
    </div>

    <div id="view-tasks" class="view">
        <div id="agendaContainer" class="agenda-layout"></div>
    </div>

    <div id="view-trash" class="view">
        <div class="trash-header">
            <h2 style="color: var(--dot-color);">Koš</h2>
            <button class="btn btn-danger" id="emptyTrashBtn" style="display: none;">Vysypat koš 🗑️</button>
        </div>
        <main class="task-container" id="trashContainer" style="min-height: auto;"></main>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" data-target="view-plan"><span>📅</span>Přehled</a>
        <a href="#" class="nav-item" data-target="view-calendar"><span>📆</span>Kalendář</a>
        <a href="#" class="nav-item" data-target="view-tasks"><span>📋</span>Úkoly</a>
        <a href="#" class="nav-item" data-target="view-trash"><span>🗑️</span>Koš</a>
    </nav>

    <dialog id="addTaskDialog">
        <div class="dialog-content"><h2 style="color: var(--primary)">Nový úkol</h2><input type="text" id="newTaskInput" placeholder="např. Vyluxovat 🧹" autocomplete="off"><div class="dialog-actions"><button class="btn btn-text" id="closeAddDialogBtn">Zrušit</button><button class="btn btn-primary" id="saveTaskBtn">Uložit</button></div></div>
    </dialog>

    <dialog id="editTaskDialog">
        <div class="dialog-content">
            <h2 style="color: var(--primary)">Upravit úkol</h2>
            <input type="text" id="editTaskInput" autocomplete="off">
            <div class="dialog-actions" style="justify-content: space-between;">
                <button class="icon-btn" id="deleteTaskBtn" style="color: var(--dot-color); font-size: 1.5rem;">🗑️</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-text" id="closeEditDialogBtn">Zrušit</button>
                    <button class="btn btn-primary" id="saveEditTaskBtn">Uložit</button>
                </div>
            </div>
        </div>
    </dialog>

    <dialog id="moveTaskDialog">
        <div class="dialog-content" style="padding: 10px;"><h3 style="text-align:center; color: var(--primary); margin-bottom: 10px;">Přesunout na:</h3><div class="calendar-header" style="padding: 5px;"><button class="icon-btn" id="movePrevMonth">◀</button><span id="moveMonthYear" style="font-size: 1rem;"></span><button class="icon-btn" id="moveNextMonth">▶</button></div><div class="calendar-grid" id="moveCalendarGrid" style="gap: 2px;"></div><div class="dialog-actions"><button class="btn btn-text" id="closeMoveDialogBtn">Zavřít</button></div></div>
    </dialog>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDIrjTWwYJbKLH98skULApKB1LpdKSwlYw",
            authDomain: "denni-planovac-4ecc1.firebaseapp.com",
            projectId: "denni-planovac-4ecc1",
            storageBucket: "denni-planovac-4ecc1.firebasestorage.app",
            messagingSenderId: "657926933778",
            appId: "1:657926933778:web:26bff4d2124ad3c36a37cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allTasks = [];
        const realTodayStr = new Date().toISOString().split('T')[0];
        let currentDate = realTodayStr; 
        let navCenterDateStr = realTodayStr; 

        let selectedTaskIdForMove = null;
        let selectedTaskIdForEdit = null;
        let mainCalDate = new Date(); 
        let moveCalDate = new Date(); 
        
        let isAnimating = false; 
        let needsReorder = false; 

        function getWeekTimecode() {
            const d = new Date(); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
            return `${d.getUTCFullYear()}-W${weekNo.toString().padStart(2, '0')}`;
        }
        function formatCzechDate(dateStr) { return new Date(dateStr).toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long' }); }

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector(`.nav-item[data-target="${viewId}"]`).classList.add('active');
            
            if (needsReorder) {
                needsReorder = false;
                renderAll();
            }

            if (viewId === 'view-tasks') {
                setTimeout(() => {
                    let scrollToEl = document.getElementById('agenda-today');
                    if (!scrollToEl) {
                        const headers = Array.from(document.querySelectorAll('.agenda-day-header'));
                        scrollToEl = headers.find(h => h.dataset.date >= realTodayStr);
                    }
                    if (scrollToEl) {
                        const y = scrollToEl.getBoundingClientRect().top + window.pageYOffset - 20;
                        window.scrollTo({top: y, behavior: 'auto'});
                    }
                }, 50);
            }
        }

        function animateTransition(container, direction, updateStateFunc) {
            if (isAnimating) return;
            isAnimating = true;

            const clone = container.cloneNode(true);
            clone.classList.add('slide-clone');
            container.parentNode.appendChild(clone);

            container.style.visibility = 'hidden';
            updateStateFunc(); 

            const shiftOut = direction === 'next' ? '-100%' : '100%';
            const shiftIn = direction === 'next' ? '100%' : '-100%';

            container.style.transform = `translateX(${shiftIn})`;
            container.style.transition = 'none'; 
            container.style.visibility = 'visible';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    container.style.transition = 'transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1)';
                    clone.style.transition = 'transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1)';
                    
                    container.style.transform = 'translateX(0)';
                    clone.style.transform = `translateX(${shiftOut})`;

                    setTimeout(() => {
                        if(clone.parentNode) clone.parentNode.removeChild(clone);
                        isAnimating = false;
                    }, 350);
                });
            });
        }

        new Sortable(document.getElementById('taskContainer'), {
            handle: '.drag-handle',
            animation: 150,
            onEnd: function (evt) {
                const items = evt.to.children;
                for (let i = 0; i < items.length; i++) {
                    const id = items[i].dataset.id;
                    if (id) updateDoc(doc(db, "tasks", id), { order: i });
                }
            }
        });

        onSnapshot(collection(db, "tasks"), (snapshot) => {
            allTasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (!isAnimating && !needsReorder) renderAll(); 
        });

        function renderAll() {
            renderDaysNav();
            renderDailyPlan();
            renderTrash(); 
            renderCalendar(mainCalDate, 'mainCalendarGrid', 'calMonthYear', (d) => {
                currentDate = d; navCenterDateStr = d; 
                document.getElementById('daysNav').dataset.initialized = ""; 
                needsReorder = false;
                switchView('view-plan'); renderAll();
            });
            if(document.getElementById('moveTaskDialog').open) {
                renderCalendar(moveCalDate, 'moveCalendarGrid', 'moveMonthYear', async (d) => {
                    await updateDoc(doc(db, "tasks", selectedTaskIdForMove), { assignedDate: d });
                    document.getElementById('moveTaskDialog').close();
                });
            }
            renderAgenda();
        }

        function renderDaysNav() {
            const nav = document.getElementById('daysNav');
            const savedScroll = nav.scrollLeft; 
            nav.innerHTML = '';
            
            const btnLeft = document.createElement('button'); btnLeft.className = 'icon-btn'; btnLeft.innerText = '📅'; btnLeft.onclick = () => switchView('view-calendar'); nav.appendChild(btnLeft);

            const centerDate = new Date(navCenterDateStr);
            for (let i = -7; i <= 7; i++) {
                const d = new Date(centerDate); d.setDate(centerDate.getDate() + i);
                const dateStr = d.toISOString().split('T')[0]; const dayName = d.toLocaleDateString('cs-CZ', { weekday: 'short' });
                
                const a = document.createElement('a'); a.href = "#"; a.className = `day-tab ${dateStr === currentDate ? 'active' : ''} ${dateStr === realTodayStr ? 'today' : ''}`;
                a.innerHTML = `<div>${dayName}</div><div style="font-size:1.2rem">${d.getDate()}</div>`;
                if(allTasks.some(t => t.assignedDate === dateStr && !t.deleted)) a.innerHTML += `<div class="task-dot" style="bottom: 2px;"></div>`;
                a.onclick = (e) => { e.preventDefault(); currentDate = dateStr; needsReorder = false; renderAll(); };
                nav.appendChild(a);
            }

            const btnRight = document.createElement('button'); btnRight.className = 'icon-btn'; btnRight.innerText = '📅'; btnRight.onclick = () => switchView('view-calendar'); nav.appendChild(btnRight);
            nav.scrollLeft = savedScroll;

            if (savedScroll === 0 && !nav.dataset.initialized) {
                nav.dataset.initialized = "true";
                setTimeout(() => {
                    const activeEl = nav.querySelector('.active');
                    if (activeEl) nav.scrollTo({ left: activeEl.offsetLeft - (nav.clientWidth / 2) + (activeEl.clientWidth / 2), behavior: 'smooth' });
                }, 50);
            }
        }

        function renderDailyPlan() {
            const container = document.getElementById('taskContainer');
            container.innerHTML = '';
            let dayTasks = allTasks.filter(t => t.assignedDate === currentDate && !t.deleted);
            dayTasks.sort((a, b) => {
                if (a.completedTimecode && !b.completedTimecode) return 1;
                if (!a.completedTimecode && b.completedTimecode) return -1;
                return (a.order || 0) - (b.order || 0);
            });
            if (dayTasks.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#999; margin-top:40px;">Volný den. ✨</div>';
                return;
            }
            dayTasks.forEach(task => renderTaskCard(task, container, true));
        }

        function renderTaskCard(task, container, isMainView) {
            const el = document.createElement('div');
            el.className = `task-card ${task.completedTimecode ? 'completed' : ''}`;
            el.dataset.id = task.id; 
            
            if(isMainView) {
                const handle = document.createElement('div');
                handle.className = 'drag-handle';
                handle.innerText = '≡';
                el.appendChild(handle);
            } else {
                // Prostornější padding pro sekci Úkoly, kde nejsou tlačítka
                el.style.padding = '15px 20px';
            }
            
            const textSpan = document.createElement('span'); textSpan.className = 'task-text'; textSpan.innerText = task.text; el.appendChild(textSpan);

            if(isMainView) {
                const editBtn = document.createElement('button');
                editBtn.className = 'edit-btn';
                editBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>';
                editBtn.onclick = (e) => {
                    e.stopPropagation(); e.preventDefault();
                    selectedTaskIdForEdit = task.id;
                    document.getElementById('editTaskInput').value = task.text;
                    document.getElementById('editTaskDialog').showModal();
                };
                el.appendChild(editBtn);
            }

            let startX = 0, startY = 0, currentX = 0, currentY = 0, isDragging = false, isScrolling = false, dragDirection = null, longPressTimer;

            el.addEventListener('touchstart', (e) => {
                if (e.target.closest('.edit-btn') || e.target.closest('.drag-handle')) return; 
                
                const touchX = e.touches[0].clientX;
                const isEdgeSwipe = isMainView && (touchX < 40 || touchX > window.innerWidth - 40);
                if (isEdgeSwipe) return;

                startX = touchX; startY = e.touches[0].clientY;
                isDragging = true; isScrolling = false; dragDirection = null; el.style.transition = 'none';
                
                longPressTimer = setTimeout(() => {
                    if(isDragging && !isScrolling) {
                        isDragging = false; el.style.transform = '';
                        if (navigator.vibrate) navigator.vibrate(60);
                        openMoveDialog(task.id, task.assignedDate);
                    }
                }, 500); 
            }, {passive: true});

            el.addEventListener('touchmove', (e) => {
                if (!isDragging || isScrolling) return;
                currentX = e.touches[0].clientX - startX;
                currentY = e.touches[0].clientY - startY;
                
                if (Math.abs(currentX) > 10 || Math.abs(currentY) > 10) clearTimeout(longPressTimer);
                
                if (!dragDirection && isMainView && !task.completedTimecode) {
                    if (Math.abs(currentX) > 15) dragDirection = 'horizontal';
                    else if (Math.abs(currentY) > 15 && currentY > 0) isScrolling = true;
                }

                if (dragDirection === 'horizontal') {
                    if (e.cancelable) e.preventDefault(); 
                    el.style.transform = `translateX(${currentX}px)`; el.style.opacity = 1 - (Math.abs(currentX) / 300);
                }
            }, {passive: false});

            el.addEventListener('touchend', async (e) => {
                if (e.target.closest('.edit-btn') || e.target.closest('.drag-handle') || !isDragging) {
                    clearTimeout(longPressTimer);
                    return;
                }
                clearTimeout(longPressTimer);
                isDragging = false;
                el.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s';

                if (dragDirection === 'horizontal' && currentX > 100) {
                    el.style.transform = 'translateX(100vw)';
                    const next = new Date(currentDate); next.setDate(next.getDate() + 1);
                    await updateDoc(doc(db, "tasks", task.id), { assignedDate: next.toISOString().split('T')[0] });
                } else if (dragDirection === 'horizontal' && currentX < -100) {
                    el.style.transform = 'translateX(-100vw)';
                    const prev = new Date(currentDate); prev.setDate(prev.getDate() - 1);
                    await updateDoc(doc(db, "tasks", task.id), { assignedDate: prev.toISOString().split('T')[0] });
                } else {
                    el.style.transform = 'translate(0,0)'; el.style.opacity = 1;
                    if (Math.abs(currentX) < 5 && Math.abs(currentY) < 5) { 
                        const isCompleting = !task.completedTimecode;
                        const newTC = isCompleting ? getWeekTimecode() : null;
                        
                        task.completedTimecode = newTC; // Update v paměti hned
                        needsReorder = true; 
                        
                        if (isCompleting) {
                            el.classList.add('completed');
                            if(isMainView) el.querySelector('.drag-handle').style.pointerEvents = 'none';
                        } else {
                            el.classList.remove('completed');
                            if(isMainView) el.querySelector('.drag-handle').style.pointerEvents = 'auto';
                        }
                        await updateDoc(doc(db, "tasks", task.id), { completedTimecode: newTC });
                    }
                }
                currentX = 0; dragDirection = null;
            });
            container.appendChild(el);
        }

        function renderTrash() {
            const container = document.getElementById('trashContainer');
            const emptyBtn = document.getElementById('emptyTrashBtn');
            container.innerHTML = '';
            const trashedTasks = allTasks.filter(t => t.deleted === true);
            if(trashedTasks.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#999; margin-top:40px;">Koš je prázdný.</div>';
                emptyBtn.style.display = 'none';
                return;
            }
            emptyBtn.style.display = 'block'; 
            trashedTasks.forEach(task => {
                const el = document.createElement('div');
                el.className = 'task-card';
                el.innerHTML = `<span class="task-text" style="color: #888;"><strike>${task.text}</strike><br><small style="font-size: 0.85rem; color: #aaa;">Byl v: ${formatCzechDate(task.assignedDate)}</small></span><button class="icon-btn restore-btn" style="color: var(--success); font-size: 1.8rem;" title="Obnovit úkol">🔄</button>`;
                el.querySelector('.restore-btn').onclick = async () => { await updateDoc(doc(db, "tasks", task.id), { deleted: false }); };
                container.appendChild(el);
            });
        }

        document.getElementById('emptyTrashBtn').onclick = async () => {
            const trashedTasks = allTasks.filter(t => t.deleted === true);
            if(confirm('Opravdu chcete trvale smazat všechny úkoly v koši? Tuto akci nelze vrátit.')) {
                for(let task of trashedTasks) { await deleteDoc(doc(db, "tasks", task.id)); }
            }
        };

        function renderCalendar(dateObj, gridId, titleId, onDayClick) {
            const year = dateObj.getFullYear(); const month = dateObj.getMonth();
            const grid = document.getElementById(gridId); grid.innerHTML = '';
            const monthNames = ["Leden", "Únor", "Březen", "Duben", "Květen", "Červen", "Červenec", "Srpen", "Září", "Říjen", "Listopad", "Prosinec"];
            document.getElementById(titleId).innerText = `${monthNames[month]} ${year}`;
            const daysOfWeek = ['Po', 'Út', 'St', 'Čt', 'Pá', 'So', 'Ne'];
            daysOfWeek.forEach(d => { const el = document.createElement('div'); el.className = 'cal-day-name'; el.innerText = d; grid.appendChild(el); });
            let firstDay = new Date(year, month, 1).getDay(); firstDay = firstDay === 0 ? 6 : firstDay - 1; 
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i=0; i<firstDay; i++) { const empty = document.createElement('div'); empty.className = 'cal-day empty'; grid.appendChild(empty); }
            for(let i=1; i<=daysInMonth; i++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = `cal-day ${dStr === realTodayStr ? 'today' : ''} ${dStr === currentDate ? 'selected' : ''}`;
                cell.innerText = i;
                if(allTasks.some(t => t.assignedDate === dStr && !t.deleted)) { const dot = document.createElement('div'); dot.className = 'task-dot'; cell.appendChild(dot); }
                cell.onclick = () => onDayClick(dStr); grid.appendChild(cell);
            }
        }

        function renderAgenda() {
            const container = document.getElementById('agendaContainer'); container.innerHTML = '';
            let agendaTasks = allTasks.filter(t => !t.deleted);
            agendaTasks.sort((a, b) => a.assignedDate.localeCompare(b.assignedDate));
            if(agendaTasks.length === 0) { container.innerHTML = '<div style="text-align:center; color:#999; margin-top:40px;">Žádné úkoly.</div>'; return; }
            let lastDate = "";
            agendaTasks.forEach(task => {
                if (task.assignedDate !== lastDate) {
                    const header = document.createElement('div'); header.className = 'agenda-day-header';
                    header.dataset.date = task.assignedDate;
                    if (task.assignedDate === realTodayStr) { header.innerText = 'Dnes'; header.id = 'agenda-today'; }
                    else { header.innerText = formatCzechDate(task.assignedDate); }
                    container.appendChild(header); lastDate = task.assignedDate;
                }
                renderTaskCard(task, container, false);
            });
        }

        document.querySelectorAll('.nav-item').forEach(item => { item.onclick = (e) => { e.preventDefault(); switchView(e.currentTarget.closest('.nav-item').getAttribute('data-target')); }; });
        
        document.getElementById('calPrevMonth').onclick = () => { animateTransition(document.getElementById('mainCalendarGrid'), 'prev', () => { mainCalDate.setMonth(mainCalDate.getMonth() - 1); renderAll(); }); };
        document.getElementById('calNextMonth').onclick = () => { animateTransition(document.getElementById('mainCalendarGrid'), 'next', () => { mainCalDate.setMonth(mainCalDate.getMonth() + 1); renderAll(); }); };
        
        document.getElementById('movePrevMonth').onclick = () => { moveCalDate.setMonth(moveCalDate.getMonth() - 1); renderAll(); };
        document.getElementById('moveNextMonth').onclick = () => { moveCalDate.setMonth(moveCalDate.getMonth() + 1); renderAll(); };

        const addDialog = document.getElementById('addTaskDialog'); const input = document.getElementById('newTaskInput');
        document.getElementById('openAddDialogBtn').onclick = () => { input.value = ''; addDialog.showModal(); };
        document.getElementById('closeAddDialogBtn').onclick = () => addDialog.close();
        document.getElementById('saveTaskBtn').onclick = async () => {
            const val = input.value.trim();
            if (val) { addDialog.close(); await addDoc(collection(db, "tasks"), { text: val, assignedDate: currentDate, completedTimecode: null, createdAt: Date.now(), order: Date.now(), deleted: false }); }
        };

        const editDialog = document.getElementById('editTaskDialog');
        document.getElementById('closeEditDialogBtn').onclick = () => editDialog.close();
        document.getElementById('saveEditTaskBtn').onclick = async () => {
            const val = document.getElementById('editTaskInput').value.trim();
            if (val && selectedTaskIdForEdit) { editDialog.close(); await updateDoc(doc(db, "tasks", selectedTaskIdForEdit), { text: val }); }
        };

        document.getElementById('deleteTaskBtn').onclick = async () => {
            if (selectedTaskIdForEdit) { editDialog.close(); await updateDoc(doc(db, "tasks", selectedTaskIdForEdit), { deleted: true }); }
        };

        function openMoveDialog(taskId, taskDate) {
            selectedTaskIdForMove = taskId; moveCalDate = new Date(taskDate || currentDate); 
            document.getElementById('moveTaskDialog').showModal(); renderAll(); 
        }
        document.getElementById('closeMoveDialogBtn').onclick = () => document.getElementById('moveTaskDialog').close();

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

        let bgStartX = 0, bgEndX = 0, bgStartY = 0;
        document.getElementById('view-plan').addEventListener('touchstart', e => {
            if (e.target.closest('.days-nav') || e.target.closest('.add-btn')) return; 
            const touchX = e.touches[0].clientX;
            const isEdgeSwipe = touchX < 40 || touchX > window.innerWidth - 40;
            if (e.target.closest('.task-card') && !isEdgeSwipe) return; 
            bgStartX = touchX; bgStartY = e.touches[0].clientY;
        }, {passive: true});
        
        document.getElementById('view-plan').addEventListener('touchend', e => {
            if (bgStartX === 0) return;
            bgEndX = e.changedTouches[0].clientX;
            const bgEndY = e.changedTouches[0].clientY;
            const diffX = bgStartX - bgEndX; const diffY = bgStartY - bgEndY;
            bgStartX = 0;
            if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
                const direction = diffX > 0 ? 'next' : 'prev'; 
                animateTransition(document.getElementById('taskContainer'), direction, () => {
                    const current = new Date(currentDate);
                    if (direction === 'next') current.setDate(current.getDate() + 1); 
                    else current.setDate(current.getDate() - 1); 
                    currentDate = current.toISOString().split('T')[0];
                    navCenterDateStr = currentDate;
                    document.getElementById('daysNav').dataset.initialized = "";
                    needsReorder = false; renderAll();
                });
            }
        }, {passive: true});

        let calStartX = 0, calEndX = 0, calStartY = 0;
        document.getElementById('view-calendar').addEventListener('touchstart', e => { calStartX = e.touches[0].clientX; calStartY = e.touches[0].clientY; }, {passive: true});
        document.getElementById('view-calendar').addEventListener('touchend', e => {
            calEndX = e.changedTouches[0].clientX; const calEndY = e.changedTouches[0].clientY;
            const diffX = calStartX - calEndX; const diffY = calStartY - calEndY;
            if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
                const direction = diffX > 0 ? 'next' : 'prev';
                animateTransition(document.getElementById('mainCalendarGrid'), direction, () => {
                    if (direction === 'next') mainCalDate.setMonth(mainCalDate.getMonth() + 1);
                    else mainCalDate.setMonth(mainCalDate.getMonth() - 1);
                    renderAll();
                });
            }
        }, {passive: true});
    </script>
</body>
</html>
