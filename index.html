<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denní Plánovač</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2980b9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        :root {
            --primary: #2980b9;
            --success: #27ae60;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            overscroll-behavior-y: none; /* Zabrání nechtěnému obnovení stránky tahem dolů */
            padding-bottom: 80px;
        }

        /* --- HORIZONTÁLNÍ NAVIGACE DNŮ --- */
        .days-nav {
            display: flex;
            overflow-x: auto;
            background: var(--card-bg);
            padding: 15px 10px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 10;
            scrollbar-width: none;
        }
        .days-nav::-webkit-scrollbar { display: none; }

        .day-tab {
            flex: 0 0 auto;
            padding: 10px 20px;
            margin-right: 10px;
            border-radius: 25px;
            background: #eee;
            color: #666;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .day-tab.active {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        /* --- KONTEJNER ÚKOLŮ --- */
        .task-container {
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-x: hidden; /* Nutné pro efekt odhození úkolu */
        }

        /* --- KARTA ÚKOLU --- */
        .task-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow);
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            transition: transform 0.1s linear, background-color 0.4s ease, opacity 0.3s;
            touch-action: pan-y; /* Povolí vertikální scrollování, ale blokuje horizontální systémová gesta */
            user-select: none;
            cursor: pointer;
            position: relative;
        }

        .task-card.completed {
            background-color: var(--success);
            color: white;
            box-shadow: none;
        }

        /* --- TLAČÍTKO PŘIDAT --- */
        .add-btn-container {
            padding: 0 15px;
            margin-top: 10px;
        }
        .add-btn {
            width: 100%;
            padding: 18px;
            border: 2px dashed var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- DIALOGY (Popup okna) --- */
        dialog {
            margin: auto;
            border: none;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 450px;
        }
        dialog::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
        
        .dialog-content input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1.1rem;
            outline: none;
        }
        .dialog-content input:focus { border-color: var(--primary); }

        .dialog-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-text { background: transparent; color: #888; }

        /* --- SPODNÍ NAVIGACE --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.08);
            z-index: 100;
        }
        .nav-item { color: #aaa; text-decoration: none; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item span { font-size: 1.5rem; }

        /* Mřížka pro přesun úkolu */
        .days-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    </style>
</head>
<body>

    <nav class="days-nav" id="daysNav"></nav>

    <main class="task-container" id="taskContainer"></main>

    <div class="add-btn-container">
        <button class="add-btn" id="openAddDialogBtn">+ Přidat úkol</button>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><span>📅</span>Plán</a>
        <a href="#" class="nav-item"><span>📈</span>Historie</a>
        <a href="#" class="nav-item"><span>⚙️</span>Nastavení</a>
    </nav>

    <dialog id="addTaskDialog">
        <div class="dialog-content">
            <h2 style="color: var(--primary)">Co tě čeká?</h2>
            <input type="text" id="newTaskInput" placeholder="např. Vyluxovat 🧹" autocomplete="off">
            <div class="dialog-actions">
                <button class="btn btn-text" id="closeAddDialogBtn">Zrušit</button>
                <button class="btn btn-primary" id="saveTaskBtn">Uložit</button>
            </div>
        </div>
    </dialog>

    <dialog id="moveTaskDialog">
        <div class="dialog-content">
            <h2 style="color: var(--primary)">Kam s ním?</h2>
            <div id="moveDaysGrid" class="days-grid"></div>
            <div class="dialog-actions" style="margin-top: 20px;">
                <button class="btn btn-text" id="closeMoveDialogBtn">Zrušit</button>
            </div>
        </div>
    </dialog>

    <script type="module">
        // 1. FIREBASE IMPORTY
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        // 2. TVOJE KONFIGURACE (Již vyplněná)
        const firebaseConfig = {
            apiKey: "AIzaSyDIrjTWwYJbKLH98skULApKB1LpdKSwlYw",
            authDomain: "denni-planovac-4ecc1.firebaseapp.com",
            projectId: "denni-planovac-4ecc1",
            storageBucket: "denni-planovac-4ecc1.firebasestorage.app",
            messagingSenderId: "657926933778",
            appId: "1:657926933778:web:26bff4d2124ad3c36a37cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 3. STAV APLIKACE
        let currentDate = new Date().toISOString().split('T')[0]; // Dnes ve formátu YYYY-MM-DD
        let selectedTaskIdForMove = null;

        // Pomocná funkce pro časový kód (např. 2026-W19)
        function getWeekTimecode() {
            const d = new Date();
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
            return `${d.getUTCFullYear()}-W${weekNo.toString().padStart(2, '0')}`;
        }

        // 4. RENDEROVÁNÍ DNŮ (HORNÍ LIŠTA)
        function renderDaysNav() {
            const nav = document.getElementById('daysNav');
            nav.innerHTML = '';
            const today = new Date();
            
            // Ukážeme 2 dny zpět a 5 dní dopředu
            for (let i = -2; i <= 5; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                const dateStr = d.toISOString().split('T')[0];
                const dayName = d.toLocaleDateString('cs-CZ', { weekday: 'short' });
                const dayNum = d.getDate();

                const a = document.createElement('a');
                a.href = "#";
                a.className = `day-tab ${dateStr === currentDate ? 'active' : ''}`;
                a.innerHTML = `<div>${dayName}</div><div style="font-size:1.2rem">${dayNum}</div>`;
                
                a.onclick = (e) => {
                    e.preventDefault();
                    currentDate = dateStr;
                    renderDaysNav();
                    loadTasksForDate(currentDate);
                };
                nav.appendChild(a);
            }
        }

        // 5. NAČÍTÁNÍ ÚKOLŮ
        function loadTasksForDate(dateStr) {
            const taskContainer = document.getElementById('taskContainer');
            const q = query(collection(db, "tasks"), where("assignedDate", "==", dateStr));
            
            onSnapshot(q, (snapshot) => {
                taskContainer.innerHTML = '';
                if (snapshot.empty) {
                    taskContainer.innerHTML = '<div style="text-align:center; color:#999; margin-top:40px;">Na tento den nemáš žádné plány. ✨</div>';
                    return;
                }
                snapshot.forEach((docSnap) => {
                    renderTaskCard(docSnap.id, docSnap.data());
                });
            });
        }

        // 6. KARTA ÚKOLU + GESTA
        function renderTaskCard(id, task) {
            const el = document.createElement('div');
            el.className = `task-card ${task.completedTimecode ? 'completed' : ''}`;
            el.innerText = task.text;

            let startX = 0, currentX = 0, isDragging = false, longPressTimer;

            // Dotyk začíná
            el.addEventListener('pointerdown', (e) => {
                startX = e.clientX;
                isDragging = true;
                el.style.transition = 'none';

                longPressTimer = setTimeout(() => {
                    if(isDragging && Math.abs(currentX) < 15) {
                        isDragging = false;
                        el.style.transform = '';
                        if (navigator.vibrate) navigator.vibrate(60);
                        openMoveDialog(id);
                    }
                }, 600);
            });

            // Pohyb prstu
            el.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                currentX = e.clientX - startX;
                if (Math.abs(currentX) > 10) clearTimeout(longPressTimer);
                
                if (currentX > 0) { // Pouze swipe doprava
                    el.style.transform = `translateX(${currentX}px)`;
                    el.style.opacity = 1 - (currentX / 400);
                }
            });

            // Puštění prstu
            el.addEventListener('pointerup', async () => {
                if (!isDragging) return;
                clearTimeout(longPressTimer);
                isDragging = false;
                el.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s';

                if (currentX > 130) {
                    // ODHOZENO: Přesun na zítřek
                    el.style.transform = 'translateX(100vw)';
                    const nextDay = new Date(currentDate);
                    nextDay.setDate(nextDay.getDate() + 1);
                    await updateDoc(doc(db, "tasks", id), { assignedDate: nextDay.toISOString().split('T')[0] });
                } else {
                    // NÁVRAT NEBO KLIK
                    el.style.transform = 'translateX(0)';
                    el.style.opacity = 1;
                    if (Math.abs(currentX) < 5) {
                        const newTC = task.completedTimecode ? null : getWeekTimecode();
                        await updateDoc(doc(db, "tasks", id), { completedTimecode: newTC });
                    }
                }
                currentX = 0;
            });

            document.getElementById('taskContainer').appendChild(el);
        }

        // 7. OBSLUHA DIALOGŮ
        const addDialog = document.getElementById('addTaskDialog');
        const input = document.getElementById('newTaskInput');

        document.getElementById('openAddDialogBtn').onclick = () => addDialog.showModal();
        document.getElementById('closeAddDialogBtn').onclick = () => addDialog.close();
        
        document.getElementById('saveTaskBtn').onclick = async () => {
            const val = input.value.trim();
            if (val) {
                await addDoc(collection(db, "tasks"), {
                    text: val,
                    assignedDate: currentDate,
                    completedTimecode: null,
                    createdAt: Date.now()
                });
                input.value = '';
                addDialog.close();
            }
        };

        // Dialog pro přesun (Long-press)
        function openMoveDialog(taskId) {
            selectedTaskIdForMove = taskId;
            const grid = document.getElementById('moveDaysGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 6; i++) {
                const target = new Date();
                target.setDate(target.getDate() + i);
                const dStr = target.toISOString().split('T')[0];
                const dName = target.toLocaleDateString('cs-CZ', { weekday: 'short' });

                const b = document.createElement('button');
                b.className = 'btn btn-primary';
                b.innerText = `${dName} ${target.getDate()}.${target.getMonth()+1}.`;
                b.onclick = async () => {
                    await updateDoc(doc(db, "tasks", selectedTaskIdForMove), { assignedDate: dStr });
                    document.getElementById('moveTaskDialog').close();
                };
                grid.appendChild(b);
            }
            document.getElementById('moveTaskDialog').showModal();
        }
        document.getElementById('closeMoveDialogBtn').onclick = () => document.getElementById('moveTaskDialog').close();

        // 8. START A PWA
        renderDaysNav();
        loadTasksForDate(currentDate);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
